<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminary</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

  <!-- Animated background -->
  <div class="animated-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- Root layout -->
  <div class="sp-root">

    <!-- ─ Sidebar ────────────────────────────────────────── -->
    <aside class="sp-sidebar" id="sidebar">
      <div class="sidebar-inner">

        <!-- Logo -->
        <div class="sidebar-logo">
          <span class="logo-mark">✦</span>
          <span class="logo-word">Luminary</span>
          <button class="sidebar-toggle" id="btn-sidebar-toggle" title="Collapse sidebar">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M13 5 8 10l5 5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Search -->
        <div class="sidebar-search">
          <svg class="s-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="6"/><path d="m15 15 3 3" stroke-linecap="round"/>
          </svg>
          <input type="text" id="sp-search" placeholder="Search…" autocomplete="off" spellcheck="false">
          <button class="clear-search hidden" id="btn-clear-search">✕</button>
        </div>

        <!-- Nav -->
        <nav class="sidebar-nav">
          <button class="nav-item active" data-filter="all">
            <span class="nav-icon">◈</span>
            <span class="nav-label">All Notes</span>
          </button>
          <button class="nav-item" data-filter="today">
            <span class="nav-icon">◎</span>
            <span class="nav-label">Today</span>
          </button>
          <button class="nav-item" data-filter="pinned">
            <span class="nav-icon">◆</span>
            <span class="nav-label">Pinned</span>
          </button>
          <button class="nav-item" data-filter="archived">
            <span class="nav-icon">◇</span>
            <span class="nav-label">Archived</span>
          </button>
        </nav>

        <!-- Divider -->
        <div class="sidebar-divider"></div>

        <!-- Templates -->
        <div class="sidebar-section-label">Quick Start</div>
        <div class="template-list">
          <button class="tpl-btn" data-tpl="blank">✦ Blank Note</button>
          <button class="tpl-btn" data-tpl="meeting">📋 Meeting Notes</button>
          <button class="tpl-btn" data-tpl="daily">🌅 Daily Journal</button>
          <button class="tpl-btn" data-tpl="todo">✅ Todo List</button>
        </div>

        <!-- Tags -->
        <div class="sidebar-divider"></div>
        <div class="sidebar-section-label">Tags</div>
        <div class="tag-cloud" id="tag-cloud"></div>

        <!-- Footer -->
        <div class="sidebar-footer">
          <div class="storage-row">
            <span class="storage-track">
              <span class="storage-fill" id="sp-storage-fill"></span>
            </span>
            <span class="storage-pct" id="sp-storage-pct">0%</span>
          </div>
          <button class="settings-btn" id="btn-settings" title="Settings">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="10" cy="10" r="3"/>
              <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ─ Content Area ────────────────────────────────────── -->
    <main class="sp-content">

      <!-- ── LIST VIEW ───────────────────────────────────── -->
      <section class="view" id="view-list">
        <div class="list-header">
          <h2 class="list-title" id="list-title">All Notes</h2>
          <div class="list-controls">
            <select id="sort-select" class="sort-select">
              <option value="date">Recent</option>
              <option value="created">Created</option>
              <option value="color">Color</option>
            </select>
          </div>
        </div>

        <div class="notes-grid" id="notes-grid">
          <!-- Cards injected here -->
        </div>

        <div class="empty-state hidden" id="sp-empty-state">
          <div class="empty-glyph">✦</div>
          <div class="empty-heading">Nothing here yet</div>
          <div class="empty-sub">Press <kbd>Ctrl+N</kbd> or click + to create a note</div>
        </div>

        <!-- Floating action button -->
        <button class="fab" id="fab-new" title="New Note (Ctrl+N)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M10 4v12M4 10h12" stroke-linecap="round"/>
          </svg>
        </button>
      </section>

      <!-- ── EDITOR VIEW ─────────────────────────────────── -->
      <section class="view hidden" id="view-editor">

        <!-- Editor toolbar -->
        <div class="editor-toolbar" id="editor-toolbar">
          <button class="tool-btn back-btn" id="btn-back" title="Back to list (Esc)">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 5 7 10l5 5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <input class="note-title-input" id="note-title" type="text"
            placeholder="Note title…" maxlength="80" spellcheck="false">

          <!-- Color picker -->
          <div class="color-picker" id="color-picker">
            <button class="color-swatch active" data-color="violet" style="--sw: #a78bfa"></button>
            <button class="color-swatch" data-color="pink"   style="--sw: #f472b6"></button>
            <button class="color-swatch" data-color="cyan"   style="--sw: #67e8f9"></button>
            <button class="color-swatch" data-color="green"  style="--sw: #4ade80"></button>
            <button class="color-swatch" data-color="amber"  style="--sw: #fbbf24"></button>
            <button class="color-swatch" data-color="rose"   style="--sw: #fb7185"></button>
          </div>

          <div class="toolbar-actions">
            <button class="tool-btn" id="btn-pin" title="Pin note">📌</button>
            <button class="tool-btn editor-mode-btn" id="btn-toggle-mode" title="Toggle split/preview">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="4" width="7" height="12" rx="1"/>
                <rect x="11" y="4" width="7" height="12" rx="1"/>
              </svg>
            </button>
            <button class="tool-btn" id="btn-zen" title="Focus mode (Ctrl+Shift+Z)">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 4h4M4 4v4M16 4h-4M16 4v4M4 16h4M4 16v-4M16 16h-4M16 16v-4"/>
              </svg>
            </button>
            <div class="export-wrap">
              <button class="tool-btn" id="btn-export" title="Export">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M10 3v10M6 9l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M4 15h12" stroke-linecap="round"/>
                </svg>
              </button>
              <div class="export-menu hidden" id="export-menu">
                <button class="export-item" id="btn-copy-md">Copy Markdown</button>
                <button class="export-item" id="btn-download-md">Download .md</button>
              </div>
            </div>
            <button class="tool-btn danger-btn" id="btn-delete" title="Delete note">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 6h12M8 6V4h4v2M7 6v10a1 1 0 001 1h4a1 1 0 001-1V6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Editor body -->
        <div class="editor-body" id="editor-body">
          <div class="editor-pane" id="editor-pane">
            <textarea id="note-content" placeholder="Start writing… Markdown supported&#10;&#10;Use # for headings, **bold**, *italic*, `code`&#10;- [ ] for todos, #tags" spellcheck="true"></textarea>
          </div>
          <div class="editor-divider" id="editor-divider"></div>
          <div class="preview-pane" id="preview-pane">
            <div class="preview-content" id="preview-content"></div>
          </div>
        </div>

        <!-- Status bar -->
        <div class="editor-statusbar">
          <span class="status-words" id="status-words">0 words</span>
          <span class="status-dot">·</span>
          <span class="status-saved" id="status-saved">Not saved</span>
          <span class="status-dot">·</span>
          <button class="status-drafts-btn" id="btn-drafts">0 drafts</button>
        </div>

        <!-- Draft panel -->
        <div class="drafts-panel hidden" id="drafts-panel">
          <div class="drafts-header">
            <span>Saved Drafts</span>
            <button class="icon-btn-xs" id="btn-close-drafts">✕</button>
          </div>
          <div class="drafts-list" id="drafts-list"></div>
        </div>

        <!-- Delete confirm -->
        <div class="delete-confirm hidden" id="delete-confirm">
          <span>Delete this note?</span>
          <button class="confirm-yes" id="btn-confirm-delete">Delete</button>
          <button class="confirm-no" id="btn-cancel-delete">Cancel</button>
        </div>

      </section>

      <!-- ── ZEN MODE ────────────────────────────────────── -->
      <section class="view hidden" id="view-zen">
        <div class="zen-topbar" id="zen-topbar">
          <button class="zen-exit-btn" id="btn-exit-zen">✕ Exit Focus</button>
          <span class="zen-title" id="zen-title"></span>
          <span class="zen-wc" id="zen-wc">0 words</span>
        </div>
        <div class="zen-body">
          <div class="zen-fade-top"></div>
          <textarea class="zen-textarea" id="zen-textarea" spellcheck="true" placeholder="Write freely…"></textarea>
          <div class="zen-fade-bottom"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal-card" id="settings-card">
      <div class="modal-header">
        <span>Settings</span>
        <button class="icon-btn-xs" id="btn-close-settings">✕</button>
      </div>
      <div class="modal-body">
        <label class="setting-row">
          <span>Default color</span>
          <select id="setting-color">
            <option value="violet">Violet</option>
            <option value="pink">Pink</option>
            <option value="cyan">Cyan</option>
            <option value="green">Green</option>
            <option value="amber">Amber</option>
            <option value="rose">Rose</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Editor mode</span>
          <select id="setting-editor">
            <option value="split">Split (edit + preview)</option>
            <option value="toggle">Toggle (one pane)</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Sort notes by</span>
          <select id="setting-sort">
            <option value="date">Last modified</option>
            <option value="created">Date created</option>
            <option value="color">Color</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="sp-toast hidden" id="sp-toast"></div>

  <script src="../libs/gsap.min.js"></script>
  <script src="../libs/marked.min.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
