<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminary</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="animated-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="glass-shell">

    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Luminary</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-search" title="Search (Ctrl+F)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="6"/><path d="m15 15 3 3" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-open-panel" title="Open Full Panel">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="14" height="14" rx="2"/>
            <path d="M13 3v14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search bar (hidden by default) -->
    <div class="search-bar hidden" id="search-bar">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="9" cy="9" r="6"/><path d="m15 15 3 3" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off" spellcheck="false">
      <button class="icon-btn-xs" id="btn-clear-search">✕</button>
    </div>

    <!-- Quick Capture bar (shown when page has selected text) -->
    <div class="capture-bar hidden" id="capture-bar">
      <div class="capture-label">
        <span class="capture-icon">⚡</span>
        <span class="capture-title">Quick Capture</span>
      </div>
      <div class="capture-preview" id="capture-preview"></div>
      <div class="capture-source" id="capture-source"></div>
      <button class="btn-capture" id="btn-save-clip">Save Clip</button>
    </div>

    <!-- New note bar -->
    <div class="new-note-bar hidden" id="new-note-bar">
      <input type="text" id="new-note-input" placeholder="Note title… (Enter to create)" maxlength="80">
      <div class="template-pills">
        <button class="pill" data-tpl="blank">Blank</button>
        <button class="pill" data-tpl="meeting">📋 Meeting</button>
        <button class="pill" data-tpl="daily">🌅 Journal</button>
        <button class="pill" data-tpl="todo">✅ Todo</button>
      </div>
    </div>

    <!-- Notes list -->
    <div class="notes-list" id="notes-list">
      <div class="empty-state hidden" id="empty-state">
        <span class="empty-icon">✦</span>
        <p>No notes yet.<br>Press <kbd>N</kbd> to create one.</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="btn-new" id="btn-new">
        <span>+</span> New Note
      </button>
      <div class="storage-info" id="storage-info">
        <div class="storage-bar-track">
          <div class="storage-bar-fill" id="storage-fill"></div>
        </div>
        <span class="storage-label" id="storage-label">sync</span>
      </div>
    </footer>

  </div>

  <script src="../libs/gsap.min.js"></script>
  <script src="../libs/marked.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
